<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1672 941" width="1672" height="941" preserveAspectRatio="xMidYMid slice" role="img" aria-label="sokoe hero background">
  <defs>
    <linearGradient id="bgBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5fa"/>
      <stop offset="55%" stop-color="#dde5ee"/>
      <stop offset="100%" stop-color="#b8c8d8"/>
    </linearGradient>

    <linearGradient id="bgSide" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#cdd8e2" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#9eb1c5" stop-opacity="0.85"/>
    </linearGradient>

    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#d4e2ef" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#9eb4c8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="lensRing" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#7a93a9" stop-opacity="0"/>
      <stop offset="92%" stop-color="#5b7188" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5b7188" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="columnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a93a9" stop-opacity="0"/>
      <stop offset="35%" stop-color="#5b7188" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3a4f63" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="windowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef5fb" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#7a93a9" stop-opacity="0.85"/>
    </linearGradient>

    <linearGradient id="floorFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.55"/>
    </linearGradient>

    <pattern id="dotGrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#5b7188" fill-opacity="0.45"/>
    </pattern>

    <pattern id="fineGrid" x="0" y="0" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M96 0H0V96" fill="none" stroke="#7a93a9" stroke-opacity="0.35" stroke-width="1"/>
    </pattern>

    <clipPath id="lowerHalf">
      <rect x="0" y="314" width="1672" height="627"/>
    </clipPath>
  </defs>

  <rect width="1672" height="941" fill="url(#bgBase)"/>
  <rect width="1672" height="941" fill="url(#bgSide)"/>

  <g opacity="0.85">
    <rect x="0" y="0" width="1672" height="941" fill="url(#fineGrid)"/>
  </g>

  <g clip-path="url(#lowerHalf)">
    <rect x="0" y="314" width="1672" height="627" fill="url(#dotGrid)"/>
  </g>

  <g>
    <circle cx="836" cy="170" r="520" fill="url(#lensGlow)"/>
    <circle cx="836" cy="170" r="520" fill="url(#lensRing)"/>
    <circle cx="836" cy="170" r="360" fill="none" stroke="#7a93a9" stroke-opacity="0.45" stroke-width="1.2"/>
    <circle cx="836" cy="170" r="240" fill="none" stroke="#7a93a9" stroke-opacity="0.3" stroke-width="1.2"/>
  </g>

  <g>
    <rect x="120"  y="430" width="26" height="500" fill="url(#columnGrad)"/>
    <rect x="260"  y="380" width="26" height="550" fill="url(#columnGrad)" opacity="0.9"/>
    <rect x="408"  y="460" width="26" height="470" fill="url(#columnGrad)" opacity="0.8"/>
    <rect x="1246" y="420" width="26" height="510" fill="url(#columnGrad)" opacity="0.85"/>
    <rect x="1394" y="370" width="26" height="560" fill="url(#columnGrad)" opacity="0.95"/>
    <rect x="1538" y="450" width="26" height="480" fill="url(#columnGrad)" opacity="0.75"/>
  </g>

  <g>
    <line x1="0" y1="700"  x2="1672" y2="700"  stroke="#5b7188" stroke-opacity="0.55" stroke-width="1.2"/>
    <line x1="0" y1="800"  x2="1672" y2="800"  stroke="#5b7188" stroke-opacity="0.4"  stroke-width="1.2"/>
    <line x1="0" y1="880"  x2="1672" y2="880"  stroke="#5b7188" stroke-opacity="0.3"  stroke-width="1.2"/>
  </g>

  <g>
    <rect x="540"  y="560" width="120" height="270" rx="14" fill="url(#windowGrad)" stroke="#7a93a9" stroke-width="1.2" stroke-opacity="0.8"/>
    <rect x="690"  y="510" width="120" height="320" rx="14" fill="url(#windowGrad)" stroke="#7a93a9" stroke-width="1.2" stroke-opacity="0.8"/>
    <rect x="840"  y="540" width="120" height="290" rx="14" fill="url(#windowGrad)" stroke="#7a93a9" stroke-width="1.2" stroke-opacity="0.8"/>
    <rect x="990"  y="490" width="120" height="340" rx="14" fill="url(#windowGrad)" stroke="#7a93a9" stroke-width="1.2" stroke-opacity="0.8"/>
    <rect x="1140" y="570" width="120" height="260" rx="14" fill="url(#windowGrad)" stroke="#7a93a9" stroke-width="1.2" stroke-opacity="0.8"/>

    <g stroke="#bccad8" stroke-opacity="0.85" stroke-width="1">
      <line x1="540"  y1="650" x2="660"  y2="650"/>
      <line x1="540"  y1="740" x2="660"  y2="740"/>
      <line x1="690"  y1="620" x2="810"  y2="620"/>
      <line x1="690"  y1="720" x2="810"  y2="720"/>
      <line x1="840"  y1="640" x2="960"  y2="640"/>
      <line x1="840"  y1="730" x2="960"  y2="730"/>
      <line x1="990"  y1="600" x2="1110" y2="600"/>
      <line x1="990"  y1="700" x2="1110" y2="700"/>
      <line x1="1140" y1="660" x2="1260" y2="660"/>
      <line x1="1140" y1="750" x2="1260" y2="750"/>
    </g>
  </g>

  <g>
    <path d="M0 760 Q 836 700 1672 770" fill="none" stroke="#5b7188" stroke-opacity="0.55" stroke-width="1.4"/>
    <path d="M0 820 Q 836 770 1672 830" fill="none" stroke="#5b7188" stroke-opacity="0.4" stroke-width="1.2"/>
  </g>

  <g>
    <line x1="1300" y1="500" x2="1300" y2="610" stroke="#ed1a29" stroke-width="3" stroke-linecap="round"/>
    <circle cx="1300" cy="490" r="5" fill="#ed1a29"/>
  </g>

  <rect x="0" y="640" width="1672" height="301" fill="url(#floorFade)"/>
</svg>
